<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Transition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #4a5d23;
            --pixel-accent: #a8d56f;
            --pixel-text: #2d4a22;
            
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            image-rendering: pixelated;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--pixel-bg);
            font-family: 'VT323', monospace;
        }

        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.8);
        }

        /* 角色容器 */
        .character-container {
            position: absolute;
            bottom: 25vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            pointer-events: none; 
            z-index: 5;
        }

        .character {
            width: 45vw;
            max-width: 280px;
            height: auto;
            transition: all 0.3s steps(2);
            filter: brightness(0.5) grayscale(0.5);
            opacity: 0.6;
        }

        .character.active {
            filter: brightness(1) grayscale(0);
            transform: scale(1.1);
            opacity: 1;
            z-index: 10;
        }

        /* 對話框 */
        .pixel-dialogue {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            min-height: 140px;
            background: rgba(255, 254, 240, 0.98);
            border: 4px solid var(--pixel-border);
            box-shadow: 0 4px 0 -1px var(--pixel-border), 0 -4px 0 -1px var(--pixel-border), 4px 0 0 -1px var(--pixel-border), -4px 0 0 -1px var(--pixel-border);
            padding: 20px;
            z-index: 20;
        }

        .name-tag {
            font-size: 22px;
            color: white;
            background: var(--pixel-accent);
            padding: 2px 10px;
            border: 2px solid var(--pixel-border);
            position: absolute; top: -20px; left: 10px;
        }

        .message { font-size: 26px; color: var(--pixel-text); line-height: 1.2; margin-top: 5px; }

        .next-btn {
            position: absolute; right: 15px; bottom: 10px;
            background: var(--pixel-accent);
            border: 2px solid var(--pixel-border);
            color: white; font-family: 'VT323', monospace; font-size: 24px;
            padding: 2px 15px; cursor: pointer;
            box-shadow: 3px 3px 0 var(--pixel-border);
        }

        /* 彈出視窗 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .item-modal {
            background: white;
            border: 6px solid var(--pixel-border);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: popUp 0.3s steps(2);
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 道具與閃光容器 */
        .item-visual-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .item-img {
            width: 180px;
            height: auto;
            z-index: 10;
            position: relative;
            filter: drop-shadow(0 0 10px rgba(255, 255, 100, 0.8));
            animation: itemFloat 2s ease-in-out infinite;
        }

        @keyframes itemFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* 超強閃光效果 (Sparkles) - 增加更多 */
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #ffffff, #ffffaa);
            width: 16px;
            height: 16px;
            clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
            animation: blinkSparkle 0.8s infinite alternate;
            z-index: 15;
            box-shadow: 0 0 8px rgba(255, 255, 200, 0.9);
        }

        /* 增加更多閃光位置 */
        .s1 { top: 5%; left: 8%; animation-delay: 0.1s; }
        .s2 { top: 15%; right: 10%; animation-delay: 0.3s; transform: scale(1.3); }
        .s3 { bottom: 15%; left: 15%; animation-delay: 0.5s; transform: scale(1.1); }
        .s4 { bottom: 8%; right: 8%; animation-delay: 0.2s; }
        .s5 { top: 40%; left: -2%; animation-delay: 0.4s; transform: scale(1.5); }
        .s6 { top: 55%; right: -5%; animation-delay: 0.6s; transform: scale(1.4); }
        .s7 { top: 70%; left: 30%; animation-delay: 0.15s; transform: scale(0.9); }
        .s8 { bottom: 40%; right: 25%; animation-delay: 0.45s; transform: scale(1.2); }
        .s9 { top: 10%; right: 30%; animation-delay: 0.7s; transform: scale(1); }
        .s10 { bottom: 10%; left: 40%; animation-delay: 0.35s; transform: scale(1.1); }
        .s11 { top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0.25s; transform: scale(1.6); }
        .s12 { top: 80%; left: 60%; animation-delay: 0.55s; transform: scale(1); }

        @keyframes blinkSparkle {
            0%, 100% { transform: scale(0.2); opacity: 0; }
            30% { transform: scale(0.8); opacity: 0.6; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0.3; }
        }

        /* 圓形光暈背景 - 增強發光效果 */
        .glow-bg {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, 
                rgba(255, 255, 150, 0.8) 0%, 
                rgba(255, 255, 100, 0.5) 30%,
                rgba(255, 200, 50, 0.3) 60%,
                rgba(255, 255, 255, 0) 100%);
            animation: pulseGlow 1.2s infinite ease-in-out;
            z-index: 1;
            border-radius: 50%;
        }

        /* 第二層光暈 */
        .glow-bg-outer {
            position: absolute;
            width: 240px;
            height: 240px;
            background: radial-gradient(circle, 
                rgba(255, 255, 200, 0.4) 0%, 
                rgba(255, 200, 100, 0.2) 40%,
                rgba(255, 255, 255, 0) 80%);
            animation: pulseGlowOuter 1.5s infinite ease-in-out;
            z-index: 0;
            border-radius: 50%;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes pulseGlowOuter {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.35); opacity: 0.7; }
        }

        /* 旋轉光環 */
        .rotate-ring {
            position: absolute;
            width: 210px;
            height: 210px;
            border: 2px solid rgba(255, 255, 150, 0.7);
            border-radius: 50%;
            animation: rotateRing 3s linear infinite;
            z-index: 2;
            box-shadow: 0 0 15px rgba(255, 255, 150, 0.5);
        }

        .rotate-ring2 {
            position: absolute;
            width: 230px;
            height: 230px;
            border: 1px solid rgba(255, 200, 100, 0.5);
            border-radius: 50%;
            animation: rotateRingReverse 4s linear infinite;
            z-index: 2;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* 粒子光點環繞 */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffffaa, #ffcc66);
            border-radius: 50%;
            animation: particleOrbit 2s linear infinite;
            z-index: 12;
        }

        .p1 { top: 10%; left: 15%; animation-delay: 0s; }
        .p2 { top: 20%; right: 12%; animation-delay: 0.3s; }
        .p3 { bottom: 15%; left: 20%; animation-delay: 0.6s; }
        .p4 { bottom: 20%; right: 18%; animation-delay: 0.9s; }
        .p5 { top: 45%; left: -2%; animation-delay: 1.2s; }
        .p6 { top: 50%; right: -5%; animation-delay: 1.5s; }
        .p7 { top: 75%; left: 35%; animation-delay: 0.5s; }
        .p8 { bottom: 35%; right: 30%; animation-delay: 0.8s; }

        @keyframes particleOrbit {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .modal-text {
            font-size: 24px;
            color: var(--pixel-text);
            line-height: 1.3;
        }

        .get-text {
            color: #d32f2f;
            font-size: 34px;
            margin-bottom: 8px;
            display: block;
            text-shadow: 2px 2px 0 rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="character-container">
        <img id="chitu" class="character" src="chi-tu.png">
        <img id="shuchong" class="character" src="shu-chong.png">
    </div>

    <div class="pixel-dialogue" id="dialogue-box">
        <div class="name-tag" id="speaker-name">...</div>
        <div class="message" id="message-text">...</div>
        <button class="next-btn" id="btn-next" onclick="nextStep()">-></button>
    </div>

    <div class="overlay" id="modal-overlay">
        <div class="item-modal">
            <div class="item-visual-container">
                <!-- 外層光暈 -->
                <div class="glow-bg-outer"></div>
                
                <!-- 旋轉光環 -->
                <div class="rotate-ring"></div>
                <div class="rotate-ring2"></div>
                
                <!-- 內層光暈 -->
                <div class="glow-bg"></div>
                
                <!-- 閃光粒子 (Sparkles) -->
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
                <div class="sparkle s3"></div>
                <div class="sparkle s4"></div>
                <div class="sparkle s5"></div>
                <div class="sparkle s6"></div>
                <div class="sparkle s7"></div>
                <div class="sparkle s8"></div>
                <div class="sparkle s9"></div>
                <div class="sparkle s10"></div>
                <div class="sparkle s11"></div>
                <div class="sparkle s12"></div>
                
                <!-- 環繞粒子 -->
                <div class="particle p1"></div>
                <div class="particle p2"></div>
                <div class="particle p3"></div>
                <div class="particle p4"></div>
                <div class="particle p5"></div>
                <div class="particle p6"></div>
                <div class="particle p7"></div>
                <div class="particle p8"></div>

                <img src="watch.png" alt="Watch" class="item-img">
            </div>
            <div class="modal-text">
                <b class="get-text">‘Watch’ Get!</b>
                Looks like just a normal watch(?)<br>
                It probably will be useful in the final war with the villain…<br><br>
                Please move to the next location.
            </div>
        </div>
    </div>

    <script>
        const story = [
            { name: "遲兔(Late Rabbit)", text: "You catched watch too…! Successfully!", active: "chitu", btn: "->" },
            { name: "書蟲(Bookworm)", text: "I hope you will never be late again.", active: "shuchong", btn: "->" },
            { name: "遲兔(Late Rabbit)", text: "Of course! You have done a great job!", active: "chitu", btn: "->" },
            { name: "遲兔(Late Rabbit)", text: "Just in time! You're a lifesaver. Take my Stopwatch.", active: "chitu", btn: "tap to next" }
        ];

        let currentLine = 0;

        function updateUI() {
            if (currentLine < story.length) {
                const line = story[currentLine];
                document.getElementById('speaker-name').innerText = line.name;
                document.getElementById('message-text').innerText = line.text;
                document.getElementById('btn-next').innerText = line.btn;
                document.getElementById('chitu').className = 'character' + (line.active === 'chitu' ? ' active' : '');
                document.getElementById('shuchong').className = 'character' + (line.active === 'shuchong' ? ' active' : '');
            } else {
                document.getElementById('modal-overlay').style.display = 'flex';
            }
        }

        function nextStep() {
            currentLine++;
            updateUI();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
